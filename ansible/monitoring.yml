---
- hosts: monitoring
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable and start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create monitoring directory
      file:
        path: /opt/monitoring
        state: directory
        mode: '0755'

    - name: Create Prometheus configuration file
      copy:
        dest: /opt/monitoring/prometheus.yml
        mode: '0644'
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

    - name: Stop existing Prometheus container if present
      command: docker rm -f prometheus
      ignore_errors: yes

    - name: Stop existing Grafana container if present
      command: docker rm -f grafana
      ignore_errors: yes

    - name: Run Prometheus container
      command: >
        docker run -d --name prometheus
        -p 9090:9090
        -v /opt/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
        prom/prometheus:latest

    - name: Run Grafana container
      command: >
        docker run -d --name grafana
        -p 3000:3000
        grafana/grafana:latest
